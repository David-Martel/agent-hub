# Agent Hub — Lefthook Configuration
# Install: lefthook install

skip_output:
  - meta

pre-commit:
  parallel: true
  commands:
    rust-fmt:
      root: "rust-cli"
      glob: "*.rs"
      run: cargo fmt -- --check

    rust-clippy:
      root: "rust-cli"
      glob: "*.rs"
      env:
        RUSTC_WRAPPER: ""
      run: cargo clippy --all-targets --quiet -- -D warnings

    ast-grep-rust:
      root: "rust-cli"
      glob: "*.rs"
      run: sg scan --config ~/.claude/sgconfig.yml {staged_files} 2>/dev/null; exit 0

pre-push:
  parallel: true
  commands:
    rust-test:
      root: "rust-cli"
      glob: "*.rs"
      env:
        RUSTC_WRAPPER: ""
      run: cargo test --quiet

    rust-audit:
      root: "rust-cli"
      run: cargo audit --quiet 2>/dev/null; exit 0

commit-msg:
  commands:
    conventional:
      run: "grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)' {1} || echo 'WARNING: Consider conventional commit format'; exit 0"
