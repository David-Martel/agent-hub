name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: error
  CARGO_HOME: T:\RustCache\cargo-home
  CARGO_TARGET_DIR: T:\RustCache\cargo-target

jobs:
  format:
    name: Format Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - run: cargo fmt --all --check

  clippy:
    name: Clippy Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test-unit:
    name: Unit Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - run: cargo test --workspace --lib --bins -- --test-threads=4

  test-integration:
    name: Integration Tests
    runs-on: self-hosted
    needs: [test-unit]
    # Uses local Redis at localhost:6380 and PostgreSQL at localhost:5300
    steps:
      - uses: actions/checkout@v6
      - name: Probe Redis and PostgreSQL
        shell: pwsh
        run: |
          $redisAvailable = $false
          try {
            & redis-cli -u "redis://localhost:6380/0" ping *> $null
            if ($LASTEXITCODE -eq 0) { $redisAvailable = $true }
          }
          catch {
          }

          $postgresAvailable = $false
          try {
            & psql "postgresql://postgres@localhost:5300/redis_backend" -Atqc "SELECT 1;" *> $null
            if ($LASTEXITCODE -eq 0) { $postgresAvailable = $true }
          }
          catch {
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Integration Preflight"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Redis available: $redisAvailable"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- PostgreSQL available: $postgresAvailable"
      - run: cargo test -p agent-bus --test integration_test --test http_integration_test --test channel_integration_test -- --test-threads=1
        env:
          AGENT_BUS_REDIS_URL: redis://localhost:6380/0
          AGENT_BUS_DATABASE_URL: postgresql://postgres@localhost:5300/redis_backend

  build-release:
    name: Release Build
    runs-on: self-hosted
    needs: [format, clippy, test-unit]
    steps:
      - uses: actions/checkout@v6
      - run: cargo build --release --workspace --bins
      - uses: actions/upload-artifact@v7
        with:
          name: agent-bus-windows-x64
          path: |
            T:\RustCache\cargo-target\release\agent-bus.exe
            T:\RustCache\cargo-target\release\agent-bus-http.exe
            T:\RustCache\cargo-target\release\agent-bus-mcp.exe

  smoke-functional:
    name: CLI And HTTP Smoke
    runs-on: self-hosted
    needs: [build-release, test-integration]
    steps:
      - uses: actions/checkout@v6
      - name: Build release binary
        run: cargo build --release --workspace --bins
      - name: Stage HTTP variant
        shell: pwsh
        run: |
          $src = "T:\RustCache\cargo-target\release\agent-bus-http.exe"
          $dst = "${{ github.workspace }}\dist\agent-bus-http.exe"
          New-Item -ItemType Directory -Path "${{ github.workspace }}\dist" -Force | Out-Null
          Copy-Item $src $dst -Force
      - name: Run functional smoke harness
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File scripts\test-agent-bus-functional.ps1 `
            -CliPath "T:\RustCache\cargo-target\release\agent-bus.exe" `
            -HttpBinaryPath "${{ github.workspace }}\dist\agent-bus-http.exe" `
            -HttpPort 8410
        env:
          AGENT_BUS_REDIS_URL: redis://localhost:6380/0
          AGENT_BUS_DATABASE_URL: postgresql://postgres@localhost:5300/redis_backend
          AGENT_BUS_SERVER_HOST: localhost

  audit:
    name: Security Audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Install latest cargo-audit
        run: cargo install cargo-audit --locked --force
      - run: cargo audit
        continue-on-error: true

  ubuntu:
    name: Ubuntu Build And Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo fmt --all --check
      - run: cargo test --workspace --lib --bins -- --test-threads=4

  bench:
    name: Benchmarks
    runs-on: self-hosted
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v6
      - run: cargo bench -p agent-bus --bench throughput -- --output-format bencher
        continue-on-error: true
      - run: cargo bench -p agent-bus --bench bus_benchmarks -- --noplot
        continue-on-error: true
      - name: Upload Criterion reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: criterion-reports
          path: T:\RustCache\cargo-target\criterion
          if-no-files-found: ignore

  cross-platform:
    name: Cross-Platform (Linux Docker)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Validate Linux build + tests via Docker
        shell: pwsh
        run: |
          $docker = Get-Command docker -ErrorAction SilentlyContinue
          if (-not $docker) {
            Write-Warning "Docker not available on this runner; skipping Linux cross-platform validation."
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Cross-Platform (Linux)`n- Skipped: Docker not available"
            exit 0
          }
          docker build -f docker/Dockerfile.linux -t agent-bus-linux-validate .
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Linux Docker build/test validation failed"
            exit 1
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Cross-Platform (Linux)`n- Linux glibc build + workspace lib tests passed"
