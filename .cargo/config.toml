[alias]
ab-build = "build -p agent-bus-cli -p agent-bus-http -p agent-bus-mcp"
ab-fast = "build -p agent-bus-cli -p agent-bus-http -p agent-bus-mcp --profile fast-release"
ab-test = "test --workspace --lib"
ab-itest = "test -p agent-bus --test http_integration_test --test channel_integration_test -- --test-threads=1"
ab-clippy = "clippy --workspace --all-targets"
ab-nextest = "nextest run --workspace"

[future-incompat-report]
frequency = "never"

[build]
rustc-wrapper = "scripts/rustc-wrapper.cmd"

[target.x86_64-pc-windows-msvc]
linker = "lld-link"
